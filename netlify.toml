[build]
  publish = "."
  command = "node scripts/generate-recipes.mjs && node scripts/generate-static-pages.mjs"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/wasfat"
  to = "/wasfat/"
  status = 301

[[redirects]]
  from = "/recipe/:slug"
  to = "/wasfat/:slug.html"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/adawat"
  to = "/adawat/"
  status = 301

[[redirects]]
  from = "/men-matbakhekum"
  to = "/men-matbakhekum/"
  status = 301

[[redirects]]
  from = "/aanna"
  to = "/aanna/"
  status = 301

[[redirects]]
  from = "/ittasil-bina"
  to = "/ittasil-bina/"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy/"
  status = 301

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"